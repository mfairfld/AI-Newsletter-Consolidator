name: Daily Newsletter Digest

on:
  schedule:
    # Runs at 11:00 AM UTC = 7:00 AM Eastern Time
    # Adjust to your timezone:
    #   6 AM ET  = cron '0 10 * * *'
    #   7 AM ET  = cron '0 11 * * *'
    #   8 AM ET  = cron '0 12 * * *'
    #  10 AM ET  = cron '0 14 * * *'
    - cron: '0 9 * * *'

  # Lets you run it manually from GitHub anytime
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-newsletter-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Restore bot state from previous run
      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: newsletter-bot-state
          restore-keys: newsletter-bot-state

      # 5. Run the newsletter bot
      - name: Run newsletter bot
        env:
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_USER_ID: ${{ secrets.COMPOSIO_USER_ID }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
        run: python newsletter_bot.py

      # 6. Save updated state for tomorrow's run
      - name: Save bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: newsletter-bot-state
